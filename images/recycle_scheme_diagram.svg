<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 240" width="100%" height="auto">
  <defs>
    <style>
      .svg-text {
        font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      }
      .card-title {
        font-weight: 700;
        font-size: 14px;
        fill: #1b4332;
      }
      .card-step {
        font-weight: 700;
        font-size: 11px;
        fill: #d8f3dc;
      }
      .card-body {
        font-size: 11px;
        fill: #2d6a4f;
        line-height: 1.6;
      }
      .arrow {
        fill: #40916c;
      }
      .shadow {
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.06));
      }
    </style>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b4332" />
      <stop offset="100%" stop-color="#2d6a4f" />
    </linearGradient>
  </defs>

  <!-- Card 1 -->
  <g class="shadow">
    <!-- Base Card -->
    <rect x="20" y="15" width="230" height="210" rx="10" fill="#ffffff" stroke="rgba(27,67,50,0.08)" stroke-width="1" />
    <!-- Header Band -->
    <path d="M 20 25 Q 20 15 30 15 L 240 15 Q 250 15 250 25 L 250 50 L 20 50 Z" fill="url(#headerGrad)" />
    <!-- Step Badge -->
    <text x="35" y="36" class="svg-text card-step">STEP 01</text>
    <!-- Card Title -->
    <text x="35" y="75" class="svg-text card-title">所有者様（手放したい方）</text>
    <!-- Card Body Items -->
    <circle cx="40" cy="105" r="3" fill="#52b788" />
    <text x="50" y="109" class="svg-text card-body">相続した実家や山林・原野</text>
    
    <circle cx="40" cy="135" r="3" fill="#52b788" />
    <text x="50" y="139" class="svg-text card-body">管理できず放置状態の土地</text>
    
    <circle cx="40" cy="165" r="3" fill="#52b788" />
    <text x="50" y="169" class="svg-text card-body">毎年かかる固定資産税や管理費</text>

    <!-- Icon (Owner) -->
    <g transform="translate(205, 23) scale(0.7)" stroke="#ffffff" stroke-width="2" fill="none">
      <circle cx="15" cy="12" r="6" />
      <path d="M 3 28 A 12 12 0 0 1 27 28" />
    </g>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(265, 105)">
    <path d="M 10 10 L 30 10 L 30 5 L 42 12 L 30 19 L 30 14 L 10 14 Z" class="arrow" />
    <text x="0" y="0" class="svg-text" font-size="10" fill="#40916c" font-weight="bold">お見積・ご契約</text>
  </g>

  <!-- Card 2 -->
  <g class="shadow">
    <!-- Base Card -->
    <rect x="310" y="15" width="230" height="210" rx="10" fill="#ffffff" stroke="rgba(27,67,50,0.08)" stroke-width="1" />
    <!-- Header Band -->
    <path d="M 310 25 Q 310 15 320 15 L 530 15 Q 540 15 540 25 L 540 50 L 310 50 Z" fill="url(#headerGrad)" />
    <!-- Step Badge -->
    <text x="325" y="36" class="svg-text card-step">STEP 02</text>
    <!-- Card Title -->
    <text x="325" y="75" class="svg-text card-title">リサイクルセンター（当窓口）</text>
    <!-- Card Body Items -->
    <circle cx="330" cy="105" r="3" fill="#52b788" />
    <text x="340" y="109" class="svg-text card-body">提携司法書士による確実な登記</text>
    
    <circle cx="330" cy="135" r="3" fill="#52b788" />
    <text x="340" y="139" class="svg-text card-body">郵送と実印だけで手続き完了</text>
    
    <circle cx="330" cy="165" r="3" fill="#52b788" />
    <text x="340" y="169" class="svg-text card-body">所有権と管理責任を引き受け</text>

    <!-- Icon (Center) -->
    <g transform="translate(495, 23) scale(0.7)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linejoin="round">
      <rect x="5" y="5" width="20" height="22" rx="2" />
      <line x1="9" y1="11" x2="21" y2="11" />
      <line x1="9" y1="16" x2="21" y2="16" />
      <line x1="9" y1="21" x2="17" y2="21" />
    </g>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(555, 105)">
    <path d="M 10 10 L 30 10 L 30 5 L 42 12 L 30 19 L 30 14 L 10 14 Z" class="arrow" />
    <text x="5" y="0" class="svg-text" font-size="10" fill="#40916c" font-weight="bold">資源再生・譲渡</text>
  </g>

  <!-- Card 3 -->
  <g class="shadow">
    <!-- Base Card -->
    <rect x="600" y="15" width="230" height="210" rx="10" fill="#ffffff" stroke="rgba(27,67,50,0.08)" stroke-width="1" />
    <!-- Header Band -->
    <path d="M 600 25 Q 600 15 610 15 L 820 15 Q 830 15 830 25 L 830 50 L 600 50 Z" fill="url(#headerGrad)" />
    <!-- Step Badge -->
    <text x="615" y="36" class="svg-text card-step">STEP 03</text>
    <!-- Card Title -->
    <text x="615" y="75" class="svg-text card-title">専門パートナー企業</text>
    <!-- Card Body Items -->
    <circle cx="620" cy="105" r="3" fill="#52b788" />
    <text x="630" y="109" class="svg-text card-body">林業保全会社への譲渡と管理</text>
    
    <circle cx="620" cy="135" r="3" fill="#52b788" />
    <text x="630" y="139" class="svg-text card-body">古民家・空き家の再生・活用</text>
    
    <circle cx="620" cy="165" r="3" fill="#52b788" />
    <text x="630" y="169" class="svg-text card-body">地域社会への持続的な還元</text>

    <!-- Icon (Partner / Tree) -->
    <g transform="translate(785, 21) scale(0.7)" stroke="#ffffff" stroke-width="2" fill="none" stroke-linejoin="round">
      <path d="M15 3 L6 18 L12 18 L4 26 L26 26 L18 18 L24 18 Z" />
      <line x1="15" y1="26" x2="15" y2="30" />
    </g>
  </g>
</svg>
