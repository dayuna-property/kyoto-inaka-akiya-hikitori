<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>負動産リサイクルセンター｜売れない空き家・古民家・山林・土地の有料引き取り専門窓口</title>
    <meta name="description" content="他社で断られた関西（京都・大阪・滋賀・兵庫・和歌山）の売れない山林、手放したい空き家を有料で完全に名義変更・引き取り代行します。空き家引き取りと山林引き取りの専用窓口はこちらからお選びください。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-primary: #1b4332;
            --color-primary-light: #2d6a4f;
            --color-accent: #52b788;
            --color-text: #2d3748;
            --color-bg: #f7fafc;
            --font-main: 'Noto Sans JP', sans-serif;
            --font-en: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            color: var(--color-text);
            background: linear-gradient(135deg, #081c15 0%, #1b4332 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* 装飾的な背景のボけ */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(82, 183, 136, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            top: -10%;
            left: -10%;
        }
        body::after {
            bottom: -10%;
            right: -10%;
        }

        header {
            text-align: center;
            padding: 3rem 1rem 1rem 1rem;
            z-index: 10;
        }

        .logo-main {
            font-family: var(--font-main);
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        .logo-sub {
            font-size: 1rem;
            color: #d8f3dc;
            opacity: 0.85;
            letter-spacing: 0.1em;
            font-weight: 300;
        }

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 10;
        }

        .gateway-container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            perspective: 1000px;
        }

        .gateway-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            text-align: center;
            color: #ffffff;
            text-decoration: none;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .gateway-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(82, 183, 136, 0.12) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 1;
        }

        .gateway-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(82, 183, 136, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 20px rgba(82, 183, 136, 0.2);
        }

        .gateway-card:hover::before {
            opacity: 1;
        }

        .card-inner {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: space-between;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: #52b788;
            margin-bottom: 2rem;
            transition: all 0.5s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gateway-card:hover .icon-wrapper {
            background: #52b788;
            color: #081c15;
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px rgba(82, 183, 136, 0.5);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            color: #ffffff;
        }

        .card-desc {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #d8f3dc;
            opacity: 0.85;
            margin-bottom: 2.5rem;
            max-width: 380px;
            font-weight: 300;
        }

        .btn-enter {
            background: transparent;
            border: 2px solid #52b788;
            color: #ffffff;
            padding: 1rem 2.5rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
        }

        .gateway-card:hover .btn-enter {
            background: #52b788;
            color: #081c15;
            border-color: #52b788;
            box-shadow: 0 8px 20px rgba(82, 183, 136, 0.3);
        }

        .btn-enter i {
            transition: transform 0.3s ease;
        }

        .gateway-card:hover .btn-enter i {
            transform: translateX(5px);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #748c81;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .gateway-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1rem;
            }

            .logo-main {
                font-size: 1.8rem;
            }

            .gateway-card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-main">負動産リサイクルセンター</div>
        <div class="logo-sub">不動産有料引き取り・処分委託専門窓口</div>
    </header>

    <main>
        <div class="gateway-container">
            <!-- 空き家引き取り窓口 -->
            <a href="akiya/index.html" class="gateway-card">
                <div class="card-inner">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-house-chimney"></i>
                    </div>
                    <div>
                        <h2 class="card-title">空き家・古民家 引き取り</h2>
                        <p class="card-desc">放置された実家、荷物が残ったままの古民家、解体が必要な老朽建物など。空き家の処分に関する専用窓口はこちらから。</p>
                    </div>
                    <span class="btn-enter">専用サイトへ進む <i class="fa-solid fa-arrow-right"></i></span>
                </div>
            </a>

            <!-- 山林引き取り窓口 -->
            <a href="sanrin/index.html" class="gateway-card">
                <div class="card-inner">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-tree"></i>
                    </div>
                    <div>
                        <h2 class="card-title">山林・原野・土地 引き取り</h2>
                        <p class="card-desc">境界が分からない森林、保安林、かつての原野商法跡地、放置された別荘地など。土地の処分に関する専用窓口はこちらから。</p>
                    </div>
                    <span class="btn-enter">専用サイトへ進む <i class="fa-solid fa-arrow-right"></i></span>
                </div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 負動産リサイクルセンター All Rights Reserved.</p>
    </footer>

</body>
</html>
